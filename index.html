<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Secure Voice Room</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            background-color: #0f0f11; color: #e0e0e0; font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #111; }

        .container {
            background: #1a1a1d; padding: 25px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            text-align: center; width: 100%; max-width: 400px; border: 1px solid #333; position: relative; transition: all 0.3s ease;
        }
        
        /* Expand container for room layout */
        .container.room-active { max-width: 900px; padding: 20px; }
        
        h2 { color: #00ffcc; letter-spacing: 2px; margin-bottom: 20px; }
        
        input {
            background: #111; color: #00ffcc; border: 1px solid #333; padding: 12px; margin: 10px 0; border-radius: 6px;
            width: 85%; font-family: inherit; text-align: center; font-size: 16px; outline: none; transition: all 0.3s ease; box-sizing: border-box;
        }
        input:focus { border-color: #00ffcc; box-shadow: 0 0 8px rgba(0, 255, 204, 0.3); }
        .input-error { border-color: #ff3366 !important; box-shadow: 0 0 8px rgba(255, 51, 102, 0.3) !important; }
        
        button {
            background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 12px 20px; margin: 10px; border-radius: 6px;
            cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s ease; width: 85%; box-sizing: border-box;
        }
        button:hover { background: #00ffcc; color: #0f0f11; box-shadow: 0 0 10px #00ffcc; }
        
        #initScreen, #mainMenu { display: flex; flex-direction: column; align-items: center; }
        #mainMenu, #roomArea { display: none; }
        
        .key-display { font-size: 32px; color: #fff; letter-spacing: 5px; margin: 5px 0; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        .status { font-size: 14px; color: #aaa; margin-top: 5px; margin-bottom: 15px; font-weight: bold; }
        .room-name-display { color: #ffaa00; font-size: 18px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }

        /* --- RESPONSIVE ROOM LAYOUT --- */
        .room-layout { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; justify-content: center; }
        .left-panel { flex: 1.5; min-width: 300px; display: flex; flex-direction: column; align-items: center; }
        .right-panel { flex: 1; min-width: 300px; display: flex; flex-direction: column; background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px; height: 500px; }

        /* --- PARTICIPANTS & VISUALIZER --- */
        #participantList {
            width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-top: 10px;
            max-height: 250px; overflow-y: auto; text-align: left; box-sizing: border-box;
        }
        .participant-item {
            color: #00ffcc; font-size: 14px; padding: 10px; border-bottom: 1px solid #222; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .participant-item:last-child { border-bottom: none; }
        .participant-info { display: flex; align-items: center; gap: 8px; flex: 1; }
        .status-icon { font-size: 16px; width: 20px; text-align: center; display: inline-block; }
        canvas.visualizer { width: 40px; height: 15px; background: transparent; border-radius: 2px; }

        /* --- HOST CONTROLS & LOBBY --- */
        .host-action-group { display: flex; gap: 5px; }
        .host-action-btn { background: transparent; border: 1px solid; padding: 6px 10px; font-size: 12px; margin: 0; border-radius: 4px; cursor: pointer; }
        .btn-mute-remote { border-color: #ffaa00; color: #ffaa00; }
        .btn-mute-remote:hover { background: #ffaa00; color: #000; }
        .btn-kick-remote { border-color: #ff3366; color: #ff3366; }
        .btn-kick-remote:hover { background: #ff3366; color: #fff; }

        #lobbyArea { width: 100%; margin-top: 15px; display: none; background: #1a1a1d; border: 1px dashed #ffaa00; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .lobby-title { color: #ffaa00; font-size: 14px; margin: 0 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .lobby-req { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; font-size: 13px; }
        .lobby-req:last-child { border-bottom: none; }
        .lobby-btns { display: flex; gap: 5px; }
        .btn-admit { border: 1px solid #00ffcc; color: #00ffcc; background: transparent; padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; }
        .btn-admit:hover { background: #00ffcc; color: #000; }
        .btn-deny { border: 1px solid #ff3366; color: #ff3366; background: transparent; padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; }
        .btn-deny:hover { background: #ff3366; color: #fff; }

        /* --- SECRET CHAT UI --- */
        .chat-header { color: #ffaa00; font-size: 16px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; text-align: left; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .chat-input-area { display: flex; gap: 10px; margin-top: 10px; }
        .chat-input-area input { margin: 0; width: 100%; text-align: left; padding: 10px; font-size: 14px; }
        .chat-input-area button { margin: 0; width: 80px; padding: 10px; font-size: 14px; }
        
        .chat-msg { background: #222; padding: 10px; border-radius: 6px; font-size: 13px; text-align: left; position: relative; overflow: hidden; animation: fadeIn 0.3s ease; }
        .chat-msg .sender { color: #00ffcc; font-weight: bold; margin-bottom: 3px; font-size: 12px; }
        .chat-msg .text { color: #ddd; word-break: break-word; }
        /* 30s Disappearing Animation line */
        .chat-msg::after { content: ''; position: absolute; bottom: 0; left: 0; height: 2px; background: #ff3366; width: 100%; animation: drain 30s linear forwards; }
        @keyframes drain { from { width: 100%; } to { width: 0%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CONTROLS --- */
        .controls-row { display: flex; justify-content: space-between; width: 100%; margin-top: 15px; gap: 10px; }
        .control-btn { width: 100%; margin: 0; padding: 12px; font-size: 14px; }
        .btn-raise { border-color: #ffaa00; color: #ffaa00; }
        .btn-raise:hover { background: #ffaa00; color: #000; }

        /* --- MODALS & TOASTS --- */
        #customModalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .custom-modal { background: #1a1a1d; padding: 25px; border-radius: 12px; border: 1px solid #00ffcc; text-align: center; width: 300px; }
        .modal-text { color: #fff; font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
        .modal-input { width: 90%; padding: 10px; margin-bottom: 20px; background: #111; color: #00ffcc; display: none; }
        .modal-btn-group { display: flex; justify-content: space-around; }
        .modal-btn { width: 40%; padding: 10px; font-size: 14px; margin: 0; }

        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(26, 26, 29, 0.95); border-left: 4px solid #00ffcc; color: #fff; padding: 12px 20px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5); font-size: 14px; animation: slideIn 0.3s ease forwards, fadeOut 0.3s ease 3.7s forwards; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        #audioContainer { display: none; }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <div id="customModalOverlay">
        <div class="custom-modal">
            <div class="modal-text" id="modalText">Message</div>
            <input type="text" class="modal-input" id="modalInput" autocomplete="off">
            <div class="modal-btn-group">
                <button class="modal-btn" id="modalCancelBtn" style="border-color: #888; color: #888;">Cancel</button>
                <button class="modal-btn" id="modalOkBtn">OK</button>
            </div>
        </div>
    </div>

    <div class="container" id="initScreen">
        <h2>SECURE GATEWAY</h2>
        <input type="text" id="userNameInput" placeholder="Enter your Name" autocomplete="off">
        <button id="enableMicBtn">Initialize Comm</button>
        <p id="errorMsg" style="color: #ff3366; font-size: 13px; display: none; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div class="container" id="mainMenu">
        <h2>VOICE ROOM</h2>
        <p id="welcomeUserText" style="color: #00ffcc; font-size: 14px; margin-top: -15px; font-weight: bold;"></p>
        <button id="createBtn">Create Room</button>
        <button id="joinBtn">Join Room</button>
    </div>

    <div class="container" id="roomArea">
        <div class="room-name-display" id="roomNameDisplay">ROOM: -----</div>
        <p style="margin: 5px 0; font-size: 14px; color: #888;">Invite Key:</p>
        <div class="key-display" id="roomIdDisplay">----</div>
        <p class="status" id="statusText">System initialized...</p>
        
        <div class="room-layout">
            <div class="left-panel">
                <div id="participantList">
                    <div style="color: #555; text-align: center; font-size: 13px; padding: 10px;">Waiting for connections...</div>
                </div>

                <div id="lobbyArea">
                    <h3 class="lobby-title">Waiting Lobby ⏳</h3>
                    <div id="lobbyList"></div>
                </div>

                <div class="controls-row">
                    <button class="control-btn" id="muteBtn">Mute 🎙️</button>
                    <button class="control-btn btn-raise" id="raiseHandBtn">Raise Hand ✋</button>
                </div>
                <button id="endBtn" style="border-color: #ff3366; color: #ff3366; margin-top: 15px; width: 100%;">End & Leave</button>
            </div>

            <div class="right-panel">
                <div class="chat-header">Secret Chat (30s) 💬</div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Message..." autocomplete="off">
                    <button id="sendChatBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="audioContainer"></div>

    <script>
        let peer;
        let localStream;
        let audioCtx; // For Visualizer
        let myName = ""; 
        let myRoomName = ""; 
        let isMuted = false;
        
        let handRaiseTimer = null;
        let globalMuteStates = {}; 
        let pendingRequests = {}; // Host Lobby

        const secretPrefix = "phantom-squad-v3-"; 
        let maxLimit = 10; 
        let isHost = false;
        let connections = {}; 
        let calls = {};       
        let visualizerFrames = {}; // Store requestAnimationFrames to cancel them

        // DOM Elements
        const initScreen = document.getElementById('initScreen');
        const enableMicBtn = document.getElementById('enableMicBtn');
        const userNameInput = document.getElementById('userNameInput');
        const errorMsg = document.getElementById('errorMsg');
        const mainMenu = document.getElementById('mainMenu');
        const welcomeUserText = document.getElementById('welcomeUserText');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const roomArea = document.getElementById('roomArea');
        const roomContainer = document.querySelector('.container');
        const roomNameDisplay = document.getElementById('roomNameDisplay');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const statusText = document.getElementById('statusText');
        const participantList = document.getElementById('participantList');
        const lobbyArea = document.getElementById('lobbyArea');
        const lobbyList = document.getElementById('lobbyList');
        
        const muteBtn = document.getElementById('muteBtn');
        const raiseHandBtn = document.getElementById('raiseHandBtn');
        const endBtn = document.getElementById('endBtn');
        const audioContainer = document.getElementById('audioContainer');
        const toastContainer = document.getElementById('toastContainer');
        
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendChatBtn = document.getElementById('sendChatBtn');

        // --- UTILS (Toasts & Modals) ---
        function showToast(message, isWarning = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            if (isWarning) toast.style.borderLeftColor = '#ff3366';
            toastContainer.appendChild(toast);
            setTimeout(() => { if (toast) toast.remove(); }, 4000);
        }

        function showModal(type, text, placeholder = "") {
            return new Promise((resolve) => {
                const overlay = document.getElementById('customModalOverlay');
                const modalText = document.getElementById('modalText');
                const modalInput = document.getElementById('modalInput');
                const okBtn = document.getElementById('modalOkBtn');
                const cancelBtn = document.getElementById('modalCancelBtn');

                modalText.innerText = text;
                overlay.style.display = 'flex';
                modalInput.value = "";
                
                if (type === 'alert') {
                    modalInput.style.display = 'none'; cancelBtn.style.display = 'none';
                    okBtn.onclick = () => { overlay.style.display = 'none'; resolve(true); };
                } else if (type === 'confirm') {
                    modalInput.style.display = 'none'; cancelBtn.style.display = 'block';
                    okBtn.onclick = () => { overlay.style.display = 'none'; resolve(true); };
                    cancelBtn.onclick = () => { overlay.style.display = 'none'; resolve(false); };
                } else if (type === 'prompt') {
                    modalInput.style.display = 'block'; modalInput.placeholder = placeholder; cancelBtn.style.display = 'block';
                    modalInput.focus();
                    okBtn.onclick = () => { overlay.style.display = 'none'; resolve(modalInput.value); };
                    cancelBtn.onclick = () => { overlay.style.display = 'none'; resolve(null); };
                }
            });
        }

        // --- VISUALIZER LOGIC ---
        function attachVisualizer(stream, canvasId) {
            if (!audioCtx) return;
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            try {
                // Handle different browser audio contexts for remote streams
                const src = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                src.connect(analyser);
                analyser.fftSize = 64;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                const ctx = canvas.getContext('2d');

                function draw() {
                    visualizerFrames[canvasId] = requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ffcc';
                    
                    let barWidth = (canvas.width / bufferLength) * 2;
                    let x = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        let barHeight = (dataArray[i] / 255) * canvas.height;
                        if(barHeight < 1) barHeight = 1; // Minimum height
                        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth + 1;
                    }
                }
                draw();
            } catch (e) {
                console.log("Visualizer not supported for this stream", e);
            }
        }

        function stopVisualizer(canvasId) {
            if (visualizerFrames[canvasId]) {
                cancelAnimationFrame(visualizerFrames[canvasId]);
                delete visualizerFrames[canvasId];
            }
        }

        // --- AUTHENTICATION ---
        enableMicBtn.onclick = async () => {
            const enteredName = userNameInput.value.trim();
            if (enteredName === "") {
                errorMsg.style.display = 'block'; errorMsg.innerText = "⚠️ Identity required!";
                userNameInput.classList.add('input-error'); return; 
            }
            myName = enteredName;
            userNameInput.classList.remove('input-error'); errorMsg.style.display = 'none';
            enableMicBtn.innerText = "Requesting Mic...";
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Initialize Audio Context for Visualizer after user gesture
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                initScreen.style.display = 'none'; mainMenu.style.display = 'flex';
                welcomeUserText.innerText = "Logged in as: " + myName; 
            } catch (error) {
                enableMicBtn.innerText = "Initialize Comm";
                errorMsg.style.display = 'block'; errorMsg.innerText = "Mic access denied. Please allow to proceed.";
            }
        };

        // --- SECRET CHAT LOGIC ---
        function renderChatMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg';
            msgDiv.innerHTML = `<div class="sender">${sender}</div><div class="text">${text}</div>`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Self-Destruct in 30 seconds
            setTimeout(() => {
                msgDiv.style.opacity = '0';
                setTimeout(() => msgDiv.remove(), 300);
            }, 30000);
        }

        sendChatBtn.onclick = () => {
            const text = chatInput.value.trim();
            if (!text) return;
            renderChatMessage(myName + " (You)", text);
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send({ type: 'chat', sender: myName, text: text });
            });
            chatInput.value = '';
        };
        chatInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendChatBtn.click(); });

        // --- GLOBAL SYNC UI ---
        function setPeerIcon(peerId, state) {
            const iconSpan = document.getElementById('icon-' + peerId);
            if (!iconSpan) return;
            if (state === 'hand') iconSpan.innerText = '✋';
            else if (state === 'muted') iconSpan.innerText = '🔇';
            else iconSpan.innerText = '🎙️';
        }

        // --- PERSONAL CONTROLS ---
        function toggleSelfMute(forcedState = null) {
            isMuted = forcedState !== null ? forcedState : !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            
            muteBtn.innerText = isMuted ? "Unmuted 🔇" : "Mute 🎙️";
            muteBtn.style.color = isMuted ? "#ff3366" : "#00ffcc";
            muteBtn.style.borderColor = isMuted ? "#ff3366" : "#00ffcc";

            setPeerIcon('me', isMuted ? 'muted' : 'unmuted');
            globalMuteStates['me'] = isMuted;

            Object.values(connections).forEach(conn => {
                if(conn.open) conn.send({ type: 'sync_mute', state: isMuted });
            });
        }
        muteBtn.onclick = () => toggleSelfMute();

        raiseHandBtn.onclick = () => {
            showToast("✋ You raised your hand");
            setPeerIcon('me', 'hand');
            clearTimeout(handRaiseTimer);
            handRaiseTimer = setTimeout(() => { setPeerIcon('me', globalMuteStates['me'] ? 'muted' : 'unmuted'); }, 5000);

            Object.values(connections).forEach(conn => {
                if(conn.open) conn.send({ type: 'raise_hand', name: myName });
            });
        };

        // --- UI & HOST FUNCTIONS ---
        function addParticipantUI(peerId, name, isCurrentlyMuted = false, stream = null) {
            if (document.getElementById('ui-' + peerId)) return;
            const emptyText = participantList.querySelector('div');
            if(emptyText && emptyText.innerText.includes('Waiting')) emptyText.remove();

            globalMuteStates[peerId] = isCurrentlyMuted;

            const div = document.createElement('div');
            div.id = 'ui-' + peerId;
            div.className = 'participant-item';
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'participant-info';
            
            const iconSpan = document.createElement('span');
            iconSpan.id = 'icon-' + peerId;
            iconSpan.className = 'status-icon';
            iconSpan.innerText = isCurrentlyMuted ? '🔇' : '🎙️';
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = name + (peerId === 'me' ? " (You)" : "");
            
            const canvasId = 'vis-' + peerId;
            const visCanvas = document.createElement('canvas');
            visCanvas.id = canvasId;
            visCanvas.className = 'visualizer';
            
            infoDiv.appendChild(iconSpan);
            infoDiv.appendChild(nameSpan);
            infoDiv.appendChild(visCanvas);
            div.appendChild(infoDiv);

            if (isHost && peerId !== 'me') {
                const actionGroup = document.createElement('div');
                actionGroup.className = 'host-action-group';

                const hMuteBtn = document.createElement('button');
                hMuteBtn.className = 'host-action-btn btn-mute-remote';
                hMuteBtn.id = 'host-mute-' + peerId;
                hMuteBtn.innerText = isCurrentlyMuted ? 'Unmute' : 'Mute';
                hMuteBtn.style.color = isCurrentlyMuted ? '#ff3366' : '#ffaa00';
                hMuteBtn.onclick = () => hostToggleMute(peerId, hMuteBtn);
                
                const kickBtn = document.createElement('button');
                kickBtn.className = 'host-action-btn btn-kick-remote';
                kickBtn.innerText = 'Kick';
                kickBtn.onclick = () => kickUser(peerId);

                actionGroup.appendChild(hMuteBtn);
                actionGroup.appendChild(kickBtn);
                div.appendChild(actionGroup);
            }
            participantList.appendChild(div);

            // Attach visualizer
            if(stream) {
                setTimeout(() => attachVisualizer(stream, canvasId), 500);
            }
        }

        function removeParticipantUI(peerId) {
            stopVisualizer('vis-' + peerId);
            const div = document.getElementById('ui-' + peerId);
            if (div) div.remove();
            delete globalMuteStates[peerId];
            if (participantList.children.length === 0) {
                participantList.innerHTML = '<div style="color: #555; text-align: center; font-size: 13px; padding: 10px;">Waiting for connections...</div>';
            }
        }

        function addAudio(peerId, stream) {
            if (document.getElementById('audio-' + peerId)) return;
            const audio = document.createElement('audio');
            audio.id = 'audio-' + peerId; audio.srcObject = stream; audio.autoplay = true;
            audioContainer.appendChild(audio);
            
            // Re-attach visualizer once stream arrives
            if(document.getElementById('vis-' + peerId)){
                attachVisualizer(stream, 'vis-' + peerId);
            }
        }

        function removePeer(peerId) {
            if (connections[peerId]) { connections[peerId].close(); delete connections[peerId]; }
            if (calls[peerId]) { calls[peerId].close(); delete calls[peerId]; }
            removeParticipantUI(peerId);
            const audio = document.getElementById('audio-' + peerId);
            if (audio) audio.remove();
        }

        function hostToggleMute(peerId, btn) {
            const isCurrentlyMuted = btn.innerText === 'Unmute';
            const action = isCurrentlyMuted ? 'unmute' : 'mute';
            if (connections[peerId]) connections[peerId].send({ type: 'host_control', action: action });
        }

        function kickUser(peerId) {
            if (connections[peerId]) {
                connections[peerId].send({ type: 'kicked' });
                setTimeout(() => removePeer(peerId), 500);
            }
        }

        // --- LOBBY LOGIC (Host) ---
        function renderLobby() {
            lobbyList.innerHTML = "";
            const keys = Object.keys(pendingRequests);
            if (keys.length === 0) {
                lobbyArea.style.display = 'none';
                return;
            }
            lobbyArea.style.display = 'block';
            
            keys.forEach(peerId => {
                const req = pendingRequests[peerId];
                const div = document.createElement('div');
                div.className = 'lobby-req';
                div.innerHTML = `<span>${req.name}</span>
                <div class="lobby-btns">
                    <button class="btn-admit" onclick="admitFromLobby('${peerId}')">Admit</button>
                    <button class="btn-deny" onclick="denyFromLobby('${peerId}')">Deny</button>
                </div>`;
                lobbyList.appendChild(div);
            });
        }

        window.admitFromLobby = function(peerId) {
            const conn = pendingRequests[peerId].conn;
            if (Object.keys(connections).length + 1 >= maxLimit) {
                showToast("Room is full! Kick someone first.", true);
                return;
            }
            conn.send({ type: 'decision', status: 'approved', peers: Object.keys(connections) });
            setupActiveConnection(conn);
            delete pendingRequests[peerId];
            renderLobby();
        };

        window.denyFromLobby = function(peerId) {
            const conn = pendingRequests[peerId].conn;
            conn.send({ type: 'decision', status: 'declined', reason: 'Host denied access.' });
            delete pendingRequests[peerId];
            renderLobby();
        };

        // --- ACTIVE CONNECTION SETUP ---
        function setupActiveConnection(conn) {
            connections[conn.peer] = conn;
            
            conn.on('data', async (data) => {
                if (data.type === 'name_broadcast') {
                    // Try to attach visualizer if audio already exists
                    let stream = null;
                    const audioEl = document.getElementById('audio-' + conn.peer);
                    if(audioEl && audioEl.srcObject) stream = audioEl.srcObject;
                    addParticipantUI(conn.peer, data.name, data.isMuted, stream);
                }
                else if (data.type === 'chat') {
                    renderChatMessage(data.sender, data.text);
                }
                else if (data.type === 'hangup') { removePeer(conn.peer); }
                else if (data.type === 'kicked') {
                    await showModal('alert', "⚠️ You have been KICKED by the Host.");
                    location.reload();
                }
                else if (data.type === 'raise_hand') {
                    showToast(`✋ ${data.name} raised hand!`);
                    setPeerIcon(conn.peer, 'hand');
                    setTimeout(() => {
                        setPeerIcon(conn.peer, globalMuteStates[conn.peer] ? 'muted' : 'unmuted');
                    }, 5000);
                }
                else if (data.type === 'host_control') {
                    if (data.action === 'mute') {
                        toggleSelfMute(true); // Force Mute
                        showToast("⚠️ You were muted by Host", true);
                    } else if (data.action === 'unmute') {
                        toggleSelfMute(false); // Force Unmute
                        showToast("✅ Host unmuted you");
                    }
                }
                else if (data.type === 'sync_mute') {
                    globalMuteStates[conn.peer] = data.state;
                    setPeerIcon(conn.peer, data.state ? 'muted' : 'unmuted');
                    
                    if (isHost) {
                        const hBtn = document.getElementById('host-mute-' + conn.peer);
                        if (hBtn) {
                            hBtn.innerText = data.state ? 'Unmute' : 'Mute';
                            hBtn.style.color = data.state ? '#ff3366' : '#ffaa00';
                        }
                    }
                }
            });

            conn.on('close', () => removePeer(conn.peer));
            setTimeout(() => { 
                if (conn.open) conn.send({ type: 'name_broadcast', name: myName, isMuted: isMuted }); 
            }, 1000);
        }

        function setupActiveCall(call) {
            calls[call.peer] = call;
            call.on('stream', (remoteStream) => addAudio(call.peer, remoteStream));
            call.on('close', () => removePeer(call.peer));
        }

        // --- HOST LOGIC ---
        createBtn.onclick = async () => {
            const enteredRoomName = await showModal('prompt', "Enter Room Name:", "e.g. Secret Squad");
            if (!enteredRoomName || enteredRoomName.trim() === "") return;
            myRoomName = enteredRoomName.trim();

            let inputLimit = await showModal('prompt', "Max Capacity? (2 to 10)", "4");
            if (inputLimit === null) return; 
            maxLimit = parseInt(inputLimit);
            if (isNaN(maxLimit) || maxLimit < 2 || maxLimit > 10) maxLimit = 10;

            isHost = true;
            const roomKey = Math.floor(1000 + Math.random() * 9000).toString();
            roomIdDisplay.innerText = roomKey;
            roomNameDisplay.innerText = "ROOM: " + myRoomName;

            peer = new Peer(secretPrefix + roomKey);

            peer.on('open', (id) => {
                mainMenu.style.display = 'none'; roomArea.style.display = 'block';
                roomContainer.classList.add('room-active');
                statusText.innerText = `Host Ready. Capacity: ${maxLimit}`;
                addParticipantUI('me', myName, isMuted, localStream); 
            });

            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'inquiry') {
                        conn.send({ type: 'room_details', hostName: myName, roomName: myRoomName });
                    }
                    else if (data.type === 'request_access') {
                        // Put in Lobby
                        pendingRequests[conn.peer] = { name: data.joinerName, conn: conn };
                        renderLobby();
                        showToast(`⏳ ${data.joinerName} is waiting in the Lobby.`);
                        
                        conn.on('close', () => { 
                            delete pendingRequests[conn.peer]; renderLobby(); 
                        });
                    }
                });
            });

            peer.on('call', (call) => {
                if (connections[call.peer]) { call.answer(localStream); setupActiveCall(call); } 
                else { call.close(); }
            });
        };

        // --- JOINER LOGIC ---
        joinBtn.onclick = async () => {
            const roomKey = await showModal('prompt', "Enter 4-digit Invite Key:", "----");
            
            if (roomKey && roomKey.length === 4) {
                isHost = false; peer = new Peer(); 

                peer.on('open', (id) => {
                    const hostId = secretPrefix + roomKey;
                    statusText.innerText = "Fetching room data...";
                    const handshakeConn = peer.connect(hostId);
                    
                    handshakeConn.on('open', () => { handshakeConn.send({ type: 'inquiry' }); });
                    
                    handshakeConn.on('data', async (data) => {
                        if (data.type === 'room_details') {
                            const wantsToJoin = await showModal('confirm', `Join "${data.hostName}"'s room "${data.roomName}"?`);
                            if (wantsToJoin) {
                                mainMenu.style.display = 'none'; roomArea.style.display = 'block';
                                roomContainer.classList.add('room-active');
                                roomNameDisplay.innerText = "ROOM: " + data.roomName;
                                roomIdDisplay.innerText = roomKey;
                                statusText.innerText = "Waiting in Lobby... ⏳";
                                statusText.style.color = "#ffaa00";
                                handshakeConn.send({ type: 'request_access', joinerName: myName });
                            } else { handshakeConn.close(); }
                        }
                        else if (data.type === 'decision') {
                            if (data.status === 'approved') {
                                statusText.innerText = "Connection Active 🟢";
                                statusText.style.color = "#00ffcc";
                                await showModal('alert', "Access Granted ✅");
                                
                                setupActiveConnection(handshakeConn);
                                addParticipantUI('me', myName, isMuted, localStream); 
                                
                                data.peers.forEach(peerId => {
                                    if(!connections[peerId]) {
                                        const newConn = peer.connect(peerId); setupActiveConnection(newConn);
                                        const newCall = peer.call(peerId, localStream); setupActiveCall(newCall);
                                    }
                                });

                                const call = peer.call(hostId, localStream); setupActiveCall(call);
                            } else {
                                await showModal('alert', "Request Denied: " + data.reason + " ❌");
                                location.reload();
                            }
                        }
                    });

                    handshakeConn.on('error', async () => {
                        await showModal('alert', "Invalid Key or Host offline.");
                        location.reload();
                    });
                });
                
                peer.on('connection', (conn) => { setupActiveConnection(conn); });
                peer.on('call', (call) => { call.answer(localStream); setupActiveCall(call); });
                
            } else {
                if (roomKey !== null) await showModal('alert', "Please enter a valid 4-digit key.");
            }
        };

        // --- LEAVE LOGIC ---
        endBtn.onclick = () => {
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send({ type: 'hangup' });
            });
            setTimeout(() => {
                if (peer) peer.destroy(); 
                if (localStream) localStream.getTracks().forEach(track => track.stop()); 
                location.reload(); 
            }, 200);
        };
    </script>
</body>
</html>
