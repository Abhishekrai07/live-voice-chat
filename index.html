<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Group Voice Room</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #0f0f11;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #1a1a1d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
            border: 1px solid #333;
        }
        h2 {
            color: #00ffcc;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        input {
            background: #111;
            color: #00ffcc;
            border: 1px solid #333;
            padding: 12px;
            margin: 10px 0 20px 0;
            border-radius: 6px;
            width: 80%;
            font-family: inherit;
            text-align: center;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
        }
        .input-error {
            border-color: #ff3366 !important;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.3) !important;
        }
        button {
            background: transparent;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 80%;
        }
        button:hover {
            background: #00ffcc;
            color: #0f0f11;
            box-shadow: 0 0 10px #00ffcc;
        }
        #initScreen, #mainMenu, #roomArea {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #mainMenu, #roomArea {
            display: none;
        }
        .key-display {
            font-size: 32px;
            color: #fff;
            letter-spacing: 5px;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .status {
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        /* Group Chat UI Styles */
        #participantList {
            width: 90%;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }
        .participant-item {
            color: #ffaa00;
            font-size: 15px;
            padding: 8px;
            border-bottom: 1px solid #222;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        .participant-item:last-child {
            border-bottom: none;
        }
        .my-name-tag {
            color: #00ffcc;
            font-size: 14px;
            margin-bottom: 10px;
        }
        #audioContainer {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="initScreen">
        <h2>GROUP COMMS</h2>
        <input type="text" id="userNameInput" placeholder="Enter your Name (Compulsory)" autocomplete="off">
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Identity required to proceed.</p>
        <button id="enableMicBtn">Enter Room</button>
        <p id="errorMsg" style="color: #ff3366; font-size: 13px; display: none; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div class="container" id="mainMenu">
        <h2>VOICE ROOM</h2>
        <p id="welcomeUserText" style="color: #00ffcc; font-size: 14px; margin-top: -15px; font-weight: bold;"></p>
        <button id="createBtn">Create Group Room</button>
        <button id="joinBtn">Join Room</button>
    </div>

    <div class="container" id="roomArea">
        <h2>LIVE SQUAD</h2>
        <p style="margin: 5px 0; font-size: 14px;">Share this Key to invite friends:</p>
        <div class="key-display" id="roomIdDisplay">----</div>
        <p class="status" id="statusText">System initialized...</p>
        
        <div class="my-name-tag" id="myNameDisplay">You: </div>
        
        <div id="participantList">
            <div style="color: #555; text-align: center; font-size: 13px; padding: 10px;">Waiting for members to join...</div>
        </div>

        <button id="endBtn" style="border-color: #ff3366; color: #ff3366; margin-top: 25px;">End & Leave</button>
    </div>

    <div id="audioContainer"></div>

    <script>
        let peer;
        let localStream;
        let myName = ""; 
        const secretPrefix = "phantom-squad-"; 
        
        // Group Chat Variables
        let maxLimit = 2; 
        let isHost = false;
        let connections = {}; // Stores all text/data connections
        let calls = {};       // Stores all voice calls

        // DOM Elements
        const initScreen = document.getElementById('initScreen');
        const enableMicBtn = document.getElementById('enableMicBtn');
        const userNameInput = document.getElementById('userNameInput');
        const errorMsg = document.getElementById('errorMsg');
        const mainMenu = document.getElementById('mainMenu');
        const welcomeUserText = document.getElementById('welcomeUserText');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const roomArea = document.getElementById('roomArea');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const statusText = document.getElementById('statusText');
        const participantList = document.getElementById('participantList');
        const myNameDisplay = document.getElementById('myNameDisplay');
        const endBtn = document.getElementById('endBtn');
        const audioContainer = document.getElementById('audioContainer');

        // --- COMPULSORY NAME & MIC ---
        enableMicBtn.onclick = async () => {
            const enteredName = userNameInput.value.trim();
            if (enteredName === "") {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "⚠️ Aage badhne ke liye apna naam daalna zaroori hai!";
                userNameInput.classList.add('input-error'); 
                return; 
            }

            myName = enteredName;
            userNameInput.classList.remove('input-error');
            errorMsg.style.display = 'none';
            enableMicBtn.innerText = "Requesting Mic...";
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                initScreen.style.display = 'none';
                mainMenu.style.display = 'flex';
                welcomeUserText.innerText = "Welcome, " + myName + " ✅"; 
                myNameDisplay.innerText = "You: " + myName;
            } catch (error) {
                enableMicBtn.innerText = "Enter Room";
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Error: Mic access denied. Kripya permission allow karein.";
            }
        };

        // --- CORE NETWORKING LOGIC (MESH NETWORK) ---

        // Function 1: Handle Data Connection
        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                conn.send({ type: 'name', value: myName }); // Humesha apna naam bhejo
            });

            conn.on('data', (data) => {
                if (data.type === 'name') {
                    addParticipantUI(conn.peer, data.value);
                }
                if (data.type === 'room_info') { // Sirf Joiner ko Host se ye list milegi
                    data.peers.forEach(peerId => {
                        // Agar naya member aata hai, to wo purane logo se khud connect hoga
                        if(!connections[peerId]) {
                            const newConn = peer.connect(peerId);
                            setupConnection(newConn);
                            const newCall = peer.call(peerId, localStream);
                            setupCall(newCall);
                        }
                    });
                }
                if (data.type === 'rejected') {
                    alert(data.reason);
                    location.reload(); // Room full hone par wapas bhej do
                }
                if (data.type === 'hangup') {
                    removePeer(conn.peer);
                }
            });

            conn.on('close', () => removePeer(conn.peer));
        }

        // Function 2: Handle Voice Calls
        function setupCall(call) {
            calls[call.peer] = call;
            call.on('stream', (remoteStream) => {
                addAudio(call.peer, remoteStream);
            });
            call.on('close', () => removePeer(call.peer));
        }

        // --- INCOMING CONNECTIONS (Kahin se bhi call aaye, automatic answer) ---
        function setupIncomingListeners() {
            peer.on('connection', (conn) => {
                // Agar main Host hu, to limit check karunga
                if(isHost) {
                    conn.on('open', () => {
                        if(Object.keys(connections).length + 1 >= maxLimit) {
                            conn.send({ type: 'rejected', reason: 'Access Denied: Room is Full! (Maximum Limit Reached) ❌' });
                            return;
                        }
                        // Agar limit khali hai, to naye bande ko batao ki room me pehle se kaun kaun hai
                        conn.send({ type: 'room_info', peers: Object.keys(connections) });
                        setupConnection(conn); // Phir usko apne network me add kar lo
                    });
                } else {
                    // Agar main joiner hu, to seedha connect kar lo
                    setupConnection(conn); 
                }
            });

            peer.on('call', (call) => {
                call.answer(localStream); // Bina pooche call utha lo (kyunki room join kiya hai)
                setupCall(call);
            });
        }

        // --- UI & AUDIO MANAGEMENT ---
        function addParticipantUI(peerId, name) {
            if (document.getElementById('ui-' + peerId)) return;
            const emptyText = participantList.querySelector('div');
            if(emptyText && emptyText.innerText.includes('Waiting')) emptyText.remove();

            const div = document.createElement('div');
            div.id = 'ui-' + peerId;
            div.className = 'participant-item';
            div.innerText = "🎙️ " + name;
            participantList.appendChild(div);
            statusText.innerText = "Group Live! 🟢";
            statusText.style.color = "#00ffcc";
        }

        function removeParticipantUI(peerId) {
            const div = document.getElementById('ui-' + peerId);
            if (div) div.remove();
            if (participantList.children.length === 0) {
                participantList.innerHTML = '<div style="color: #555; text-align: center; font-size: 13px; padding: 10px;">Waiting for members to join...</div>';
            }
        }

        function addAudio(peerId, stream) {
            if (document.getElementById('audio-' + peerId)) return;
            const audio = document.createElement('audio');
            audio.id = 'audio-' + peerId;
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.playsInline = true; // Zaroori hai mobile browsers ke liye
            audioContainer.appendChild(audio);
        }

        function removePeer(peerId) {
            if (connections[peerId]) {
                connections[peerId].close();
                delete connections[peerId];
            }
            if (calls[peerId]) {
                calls[peerId].close();
                delete calls[peerId];
            }
            removeParticipantUI(peerId);
            const audio = document.getElementById('audio-' + peerId);
            if (audio) audio.remove();
        }

        // --- CREATE GROUP ROOM ---
        createBtn.onclick = () => {
            // STEP 1: Limit poocho
            let inputLimit = prompt("Kitne logo ka room banana hai? (Max 10)", "4");
            
            if (inputLimit === null) return; // Agar cancel daba diya
            
            inputLimit = parseInt(inputLimit);
            if (isNaN(inputLimit) || inputLimit < 2 || inputLimit > 10) {
                alert("Please enter a valid number between 2 and 10.");
                return;
            }

            maxLimit = inputLimit;
            isHost = true; // Main is room ka boss hu

            const roomKey = Math.floor(1000 + Math.random() * 9000).toString();
            roomIdDisplay.innerText = roomKey;

            peer = new Peer(secretPrefix + roomKey);

            peer.on('open', (id) => {
                mainMenu.style.display = 'none';
                roomArea.style.display = 'flex';
                statusText.innerText = `Room Capacity: ${maxLimit} Members. Waiting...`;
                setupIncomingListeners();
            });
        };

        // --- JOIN ROOM ---
        joinBtn.onclick = () => {
            const roomKey = prompt("Enter the 4-digit Room Key:");
            
            if (roomKey && roomKey.length === 4) {
                isHost = false;
                peer = new Peer(); // Joiner ka ek random ID banega

                peer.on('open', (id) => {
                    mainMenu.style.display = 'none';
                    roomArea.style.display = 'flex';
                    roomIdDisplay.innerText = roomKey;
                    statusText.innerText = "Connecting to Host...";
                    setupIncomingListeners();

                    const hostId = secretPrefix + roomKey;
                    
                    // Pehle Host se data aur voice connect karo
                    const conn = peer.connect(hostId);
                    setupConnection(conn);
                    const call = peer.call(hostId, localStream);
                    setupCall(call);

                    call.on('error', () => {
                        statusText.innerText = "Connection failed. Wrong key?";
                        statusText.style.color = "#ff3366";
                    });
                });
            } else {
                alert("Please enter a valid 4-digit key.");
            }
        };

        // --- END CALL / LEAVE ROOM ---
        endBtn.onclick = () => {
            // Sabko batao ki main jaa raha hu
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send({ type: 'hangup' });
            });
            
            setTimeout(() => {
                if (peer) peer.destroy(); 
                if (localStream) localStream.getTracks().forEach(track => track.stop()); 
                location.reload(); 
            }, 200);
        };
    </script>
</body>
</html>
