<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Voice Room</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #0f0f11;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .container {
            background: #1a1a1d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            text-align: center;
            width: 320px;
            border: 1px solid #333;
        }
        h2 {
            color: #00ffcc;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        input {
            background: #111;
            color: #00ffcc;
            border: 1px solid #333;
            padding: 12px;
            margin: 10px 0 20px 0;
            border-radius: 6px;
            width: 80%;
            font-family: inherit;
            text-align: center;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
        }
        .input-error {
            border-color: #ff3366 !important;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.3) !important;
        }
        button {
            background: transparent;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 80%;
        }
        button:hover {
            background: #00ffcc;
            color: #0f0f11;
            box-shadow: 0 0 10px #00ffcc;
        }
        #initScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #mainMenu, #roomArea {
            display: none;
        }
        .key-display {
            font-size: 32px;
            color: #fff;
            letter-spacing: 5px;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .status {
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
        }
        #remoteNameDisplay {
            color: #ffaa00; 
            font-size: 18px;
            margin-top: 15px;
            min-height: 24px; /* Fixed height so design doesn't jump */
            font-weight: bold;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="initScreen">
        <h2>SECURE COMMS</h2>
        <input type="text" id="userNameInput" placeholder="Enter your Name (Compulsory)" autocomplete="off">
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Identity required to proceed.</p>
        <button id="enableMicBtn">Enter Room</button>
        <p id="errorMsg" style="color: #ff3366; font-size: 13px; display: none; margin-top: 15px; font-weight: bold;"></p>
    </div>

    <div class="container" id="mainMenu">
        <h2>VOICE ROOM</h2>
        <p id="welcomeUserText" style="color: #00ffcc; font-size: 14px; margin-top: -15px; font-weight: bold;"></p>
        <button id="createBtn">Create Room</button>
        <button id="joinBtn">Join Room</button>
    </div>

    <div class="container" id="roomArea">
        <h2>LIVE CONNECTION</h2>
        <p style="margin: 5px 0;">Room Key:</p>
        <div class="key-display" id="roomIdDisplay">----</div>
        <div id="remoteNameDisplay"></div>
        <p class="status" id="statusText">Waiting for connection...</p>
        <button id="endBtn" style="border-color: #ff3366; color: #ff3366; margin-top: 20px;">End Call</button>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script>
        let peer;
        let localStream;
        let currentConn; // To track active text connection
        let currentCall; // To track active voice connection
        let myName = ""; 
        const secretPrefix = "phantom-call-"; 

        const initScreen = document.getElementById('initScreen');
        const enableMicBtn = document.getElementById('enableMicBtn');
        const userNameInput = document.getElementById('userNameInput');
        const errorMsg = document.getElementById('errorMsg');
        
        const mainMenu = document.getElementById('mainMenu');
        const welcomeUserText = document.getElementById('welcomeUserText');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        
        const roomArea = document.getElementById('roomArea');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const statusText = document.getElementById('statusText');
        const remoteNameDisplay = document.getElementById('remoteNameDisplay');
        const endBtn = document.getElementById('endBtn');
        const remoteAudio = document.getElementById('remoteAudio');

        // Function: Jab samne wala call cut kare
        function handleRemoteHangup() {
            remoteNameDisplay.innerText = ""; // Naam hata do
            statusText.innerText = "Samne wale ne call cut kar diya ❌"; // Status change
            statusText.style.color = "#ff3366";
            remoteAudio.srcObject = null; // Awaaz band
        }

        // --- COMPULSORY NAME & MIC ---
        enableMicBtn.onclick = async () => {
            const enteredName = userNameInput.value.trim();
            if (enteredName === "") {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "⚠️ Aage badhne ke liye apna naam daalna zaroori hai!";
                userNameInput.classList.add('input-error'); 
                return; 
            }

            myName = enteredName;
            userNameInput.classList.remove('input-error');
            errorMsg.style.display = 'none';
            enableMicBtn.innerText = "Requesting Mic...";
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                initScreen.style.display = 'none';
                mainMenu.style.display = 'block';
                welcomeUserText.innerText = "Welcome, " + myName + " ✅"; 
            } catch (error) {
                enableMicBtn.innerText = "Enter Room";
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Error: Mic access denied. Kripya permission allow karein.";
            }
        };

        // --- CREATE ROOM ---
        createBtn.onclick = () => {
            const roomKey = Math.floor(1000 + Math.random() * 9000).toString();
            roomIdDisplay.innerText = roomKey;

            peer = new Peer(secretPrefix + roomKey);

            peer.on('open', (id) => {
                mainMenu.style.display = 'none';
                roomArea.style.display = 'block';
                statusText.innerText = "Waiting for someone to join...";
                statusText.style.color = "#aaa";
            });

            // Data Connection (For Name & Hangup Signal)
            peer.on('connection', (conn) => {
                currentConn = conn;
                conn.on('open', () => {
                    conn.send({ type: 'name', value: myName }); 
                });
                conn.on('data', (data) => {
                    if (data.type === 'name') {
                        remoteNameDisplay.innerText = "Call with: " + data.value;
                    }
                    if (data.type === 'hangup') { // Agar samne wale ne end dabaya
                        handleRemoteHangup();
                    }
                });
                conn.on('close', handleRemoteHangup); // Agar samne wale ka net chala jaye
            });

            // Voice Connection
            peer.on('call', (call) => {
                currentCall = call;
                call.answer(localStream);
                statusText.innerText = "Call active! 🎙️";
                statusText.style.color = "#00ffcc";
                
                call.on('stream', (remoteStream) => {
                    remoteAudio.srcObject = remoteStream;
                });
                call.on('close', handleRemoteHangup);
            });
        };

        // --- JOIN ROOM ---
        joinBtn.onclick = () => {
            const roomKey = prompt("Enter the 4-digit Room Key:");
            
            if (roomKey && roomKey.length === 4) {
                peer = new Peer(); 

                peer.on('open', (id) => {
                    mainMenu.style.display = 'none';
                    roomArea.style.display = 'block';
                    roomIdDisplay.innerText = roomKey;
                    statusText.innerText = "Connecting to room...";

                    const conn = peer.connect(secretPrefix + roomKey);
                    currentConn = conn;
                    
                    conn.on('open', () => {
                        conn.send({ type: 'name', value: myName }); 
                    });
                    conn.on('data', (data) => {
                        if (data.type === 'name') {
                            remoteNameDisplay.innerText = "Call with: " + data.value;
                        }
                        if (data.type === 'hangup') {
                            handleRemoteHangup();
                        }
                    });
                    conn.on('close', handleRemoteHangup);

                    const call = peer.call(secretPrefix + roomKey, localStream);
                    currentCall = call;

                    call.on('stream', (remoteStream) => {
                        statusText.innerText = "Call active! 🎙️";
                        statusText.style.color = "#00ffcc";
                        remoteAudio.srcObject = remoteStream;
                    });
                    call.on('close', handleRemoteHangup);
                    call.on('error', () => {
                        statusText.innerText = "Connection failed. Wrong key?";
                        statusText.style.color = "#ff3366";
                    });
                });
            } else {
                alert("Please enter a valid 4-digit key.");
            }
        };

        // --- END CALL LOGIC ---
        endBtn.onclick = () => {
            // Samne wale ko batao ki main call cut kar raha hu
            if (currentConn && currentConn.open) {
                currentConn.send({ type: 'hangup' });
            }
            
            // Thoda sa delay (100ms) dekar connection clean karo taaki message pauch jaye
            setTimeout(() => {
                if (peer) peer.destroy(); 
                if (localStream) localStream.getTracks().forEach(track => track.stop()); 
                location.reload(); 
            }, 100);
        };
    </script>
</body>
</html>
